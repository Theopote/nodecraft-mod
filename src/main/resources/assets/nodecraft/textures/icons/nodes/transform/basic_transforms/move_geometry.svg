<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- 3D box shape (subtle, shifted slightly left/down) -->
  <g opacity="0.5">
    <rect x="8" y="14" width="10" height="10" rx="1" fill="none" stroke="white" stroke-width="1.2"/>
    <path d="M8 14 L12 10 L22 10 L22 20 L18 24" fill="none" stroke="white" stroke-width="1.2"/>
    <line x1="22" y1="10" x2="18" y2="14" stroke="white" stroke-width="1.2"/>
    <line x1="18" y1="14" x2="18" y2="24" stroke="white" stroke-width="1.2"/>
  </g>
  <!-- Move arrows (X, Y, Z) -->
  <!-- Right arrow (X) -->
  <line x1="20" y1="16" x2="26" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="26,16 23.5,14.5 23.5,17.5" fill="white"/>
  <!-- Up arrow (Y) -->
  <line x1="16" y1="12" x2="16" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="16,6 14.5,8.5 17.5,8.5" fill="white"/>
  <!-- Diagonal arrow (Z) -->
  <line x1="10" y1="22" x2="7" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="7,25 9.5,23 8,25.5" fill="white"/>
</svg>
