<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Original points (faded) -->
  <circle cx="8" cy="22" r="2" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-dasharray="2,1.5"/>
  <circle cx="13" cy="18" r="2" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-dasharray="2,1.5"/>
  <circle cx="9" cy="14" r="2" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-dasharray="2,1.5"/>
  <!-- Offset arrows (parallel) -->
  <line x1="10" y1="21" x2="17" y2="16" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linecap="round"/>
  <line x1="15" y1="17" x2="22" y2="12" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linecap="round"/>
  <line x1="11" y1="13" x2="18" y2="8" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linecap="round"/>
  <!-- Moved points -->
  <circle cx="19" cy="17" r="2.2" fill="white"/>
  <circle cx="24" cy="13" r="2.2" fill="white"/>
  <circle cx="20" cy="9" r="2.2" fill="white"/>
  <!-- Arrow heads -->
  <polygon points="19,17 16.5,15.5 17.5,18" fill="white"/>
  <polygon points="24,13 21.5,11.5 22.5,14" fill="white"/>
  <polygon points="20,9 17.5,7.5 18.5,10" fill="white"/>
</svg>
