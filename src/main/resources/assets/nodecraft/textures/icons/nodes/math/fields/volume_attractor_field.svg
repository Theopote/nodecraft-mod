<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- 3D sphere in center -->
  <circle cx="16" cy="16" r="5" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
  <ellipse cx="16" cy="16" rx="5" ry="2.5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  <!-- Field lines pointing into sphere from all sides -->
  <!-- Top -->
  <line x1="16" y1="7" x2="16" y2="11.5" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linecap="round"/>
  <polygon points="16,11.5 14.8,9.5 17.2,9.5" fill="rgba(255,255,255,0.8)"/>
  <!-- Bottom -->
  <line x1="16" y1="25" x2="16" y2="20.5" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linecap="round"/>
  <polygon points="16,20.5 14.8,22.5 17.2,22.5" fill="rgba(255,255,255,0.8)"/>
  <!-- Left -->
  <line x1="7" y1="16" x2="11.5" y2="16" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linecap="round"/>
  <polygon points="11.5,16 9.5,14.8 9.5,17.2" fill="rgba(255,255,255,0.8)"/>
  <!-- Right -->
  <line x1="25" y1="16" x2="20.5" y2="16" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linecap="round"/>
  <polygon points="20.5,16 22.5,14.8 22.5,17.2" fill="rgba(255,255,255,0.8)"/>
  <!-- TL diagonal -->
  <line x1="9" y1="9" x2="12.5" y2="12.5" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/>
  <polygon points="12.5,12.5 10.5,11.2 11.2,10.5" fill="rgba(255,255,255,0.55)"/>
  <!-- TR diagonal -->
  <line x1="23" y1="9" x2="19.5" y2="12.5" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/>
  <polygon points="19.5,12.5 21.5,11.2 20.8,10.5" fill="rgba(255,255,255,0.55)"/>
  <!-- BL diagonal -->
  <line x1="9" y1="23" x2="12.5" y2="19.5" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/>
  <polygon points="12.5,19.5 10.5,20.8 11.2,21.5" fill="rgba(255,255,255,0.55)"/>
  <!-- BR diagonal -->
  <line x1="23" y1="23" x2="19.5" y2="19.5" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/>
  <polygon points="19.5,19.5 21.5,20.8 20.8,21.5" fill="rgba(255,255,255,0.55)"/>
</svg>
