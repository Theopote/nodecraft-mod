<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Y-shaped fork: vertical stem from bottom, splitting to upper-left and upper-right -->
  <!-- Stem -->
  <line x1="16" y1="25" x2="16" y2="17" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Left branch -->
  <line x1="16" y1="17" x2="9" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Right branch -->
  <line x1="16" y1="17" x2="23" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Junction dot -->
  <circle cx="16" cy="17" r="2" fill="white"/>
  <!-- Bottom endpoint dot -->
  <circle cx="16" cy="25" r="2" fill="rgba(255,255,255,0.6)"/>
  <!-- Left endpoint dot (True) -->
  <circle cx="9" cy="9" r="2.5" fill="rgba(255,255,255,0.9)"/>
  <!-- Right endpoint dot (False) -->
  <circle cx="23" cy="9" r="2.5" fill="rgba(255,255,255,0.5)"/>
  <!-- True/False labels (tiny) -->
  <text x="6.5" y="8" font-size="3.5" fill="white" font-family="sans-serif" text-anchor="middle" opacity="0.85">T</text>
  <text x="25.5" y="8" font-size="3.5" fill="white" font-family="sans-serif" text-anchor="middle" opacity="0.85">F</text>
</svg>
