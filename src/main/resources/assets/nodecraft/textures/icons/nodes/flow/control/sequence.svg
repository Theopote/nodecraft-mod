<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Vertical input bar on left -->
  <rect x="7" y="9" width="3" height="15" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <!-- Three horizontal output lines with numbers -->
  <!-- Output 1 -->
  <line x1="10" y1="11" x2="19" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="21" cy="11" r="2.5" fill="rgba(255,255,255,0.9)"/>
  <text x="21" y="13" font-size="4" fill="#D97706" font-family="sans-serif" font-weight="bold" text-anchor="middle">1</text>
  <!-- Output 2 -->
  <line x1="10" y1="16.5" x2="19" y2="16.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="21" cy="16.5" r="2.5" fill="rgba(255,255,255,0.9)"/>
  <text x="21" y="18.5" font-size="4" fill="#D97706" font-family="sans-serif" font-weight="bold" text-anchor="middle">2</text>
  <!-- Output 3 -->
  <line x1="10" y1="22" x2="19" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="21" cy="22" r="2.5" fill="rgba(255,255,255,0.9)"/>
  <text x="21" y="24" font-size="4" fill="#D97706" font-family="sans-serif" font-weight="bold" text-anchor="middle">3</text>
</svg>
