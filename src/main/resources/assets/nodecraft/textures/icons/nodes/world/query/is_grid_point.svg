<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="6" y1="10" x2="26" y2="10" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <line x1="6" y1="16" x2="26" y2="16" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <line x1="6" y1="22" x2="26" y2="22" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <line x1="10" y1="6" x2="10" y2="26" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <line x1="16" y1="6" x2="16" y2="26" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <line x1="22" y1="6" x2="22" y2="26" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <!-- Grid intersect dots -->
  <circle cx="10" cy="10" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="22" cy="10" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="10" cy="22" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="22" cy="22" r="1" fill="rgba(255,255,255,0.4)"/>
  <!-- Highlighted grid point (on grid) -->
  <circle cx="16" cy="16" r="3" fill="white"/>
  <!-- Checkmark inside -->
  <polyline points="14.5,16 15.5,17 17.5,15" stroke="#0F766E" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
