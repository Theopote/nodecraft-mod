<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Ellipsoid outline (wider than tall) -->
  <ellipse cx="16" cy="16" rx="11" ry="7" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Equator line -->
  <ellipse cx="16" cy="16" rx="11" ry="2.5" fill="none" stroke="white" stroke-width="1" opacity="0.8"/>
  <!-- Vertical meridian -->
  <ellipse cx="16" cy="16" rx="2.5" ry="7" fill="none" stroke="white" stroke-width="1" opacity="0.8"/>
  <!-- Small axis dots (x,y,z) -->
  <circle cx="16" cy="9" r="1" fill="white" opacity="0.8"/>
  <circle cx="27" cy="16" r="1" fill="white" opacity="0.8"/>
</svg>
