<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Control points connected by dashed lines -->
  <polyline points="7,22 11,10 16,20 21,10 25,18" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.8" stroke-dasharray="2,1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Smooth B-spline curve through control points -->
  <path d="M 7 22 C 8 17, 10 11, 13.5 15 S 19 22, 21 15 S 24 12, 25 18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Control point markers -->
  <circle cx="7" cy="22" r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="11" cy="10" r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="16" cy="20" r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="21" cy="10" r="1.5" fill="rgba(255,255,255,0.8)"/>
  <circle cx="25" cy="18" r="1.5" fill="rgba(255,255,255,0.8)"/>
</svg>
