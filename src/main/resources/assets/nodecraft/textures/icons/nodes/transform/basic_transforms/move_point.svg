<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Origin point (faded) -->
  <circle cx="10" cy="20" r="2.5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-dasharray="2,1.5"/>
  <!-- Destination point -->
  <circle cx="22" cy="11" r="3" fill="white"/>
  <circle cx="22" cy="11" r="1.5" fill="rgba(236,72,153,0.5)"/>
  <!-- Offset arrow -->
  <line x1="12" y1="18.5" x2="20" y2="12.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,2"/>
  <polygon points="20,12.5 16.5,13.5 18,16" fill="white"/>
  <!-- Delta label lines -->
  <line x1="10" y1="22" x2="22" y2="22" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-dasharray="2,1.5"/>
  <line x1="22" y1="11" x2="22" y2="22" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-dasharray="2,1.5"/>
</svg>
