<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Inner highlight circle -->
  <circle cx="16" cy="16" r="9" fill="rgba(255,255,255,0.08)"/>
  <!-- Checkmark inside circle -->
  <polyline points="11,16 14.5,20 21,12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- "1" badge in top-right corner to indicate "once" -->
  <circle cx="25" cy="8" r="4.5" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="1"/>
  <text x="25" y="10.5" font-size="5.5" fill="white" font-family="sans-serif" font-weight="bold" text-anchor="middle">1</text>
</svg>
