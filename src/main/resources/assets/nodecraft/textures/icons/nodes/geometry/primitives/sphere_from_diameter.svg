<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Sphere outline -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Equator ellipse -->
  <ellipse cx="16" cy="16" rx="9" ry="3" fill="none" stroke="white" stroke-width="1" opacity="0.7"/>
  <!-- Diameter line across sphere -->
  <line x1="7" y1="16" x2="25" y2="16" stroke="white" stroke-width="1.5" stroke-dasharray="2,1"/>
  <!-- Diameter endpoint dots -->
  <circle cx="7" cy="16" r="1.5" fill="white"/>
  <circle cx="25" cy="16" r="1.5" fill="white"/>
</svg>
