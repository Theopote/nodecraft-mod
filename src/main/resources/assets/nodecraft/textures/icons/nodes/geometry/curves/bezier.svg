<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Dashed control polygon -->
  <polyline points="7,23 10,9 22,23 25,9" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.9" stroke-dasharray="2,2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bezier S-curve -->
  <path d="M 7 23 C 10 9, 22 23, 25 9" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Control points -->
  <rect x="8.5" y="7.5" width="3" height="3" rx="0.5" fill="rgba(255,255,255,0.7)" stroke="white" stroke-width="0.5"/>
  <rect x="20.5" y="21.5" width="3" height="3" rx="0.5" fill="rgba(255,255,255,0.7)" stroke="white" stroke-width="0.5"/>
  <!-- Endpoint markers -->
  <circle cx="7" cy="23" r="1.8" fill="white"/>
  <circle cx="25" cy="9" r="1.8" fill="white"/>
</svg>
