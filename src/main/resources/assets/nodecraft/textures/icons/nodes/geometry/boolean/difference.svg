<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <mask id="diffMask">
      <rect width="32" height="32" fill="white"/>
      <circle cx="20" cy="16" r="5.5" fill="black"/>
    </mask>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="1" y="1" width="30" height="30" rx="6.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Shape A (left circle, masked by shape B) -->
  <circle cx="13" cy="16" r="6.5" fill="rgba(255,255,255,0.9)" mask="url(#diffMask)"/>
  <!-- Shape B outline (dashed, showing what was subtracted) -->
  <circle cx="20" cy="16" r="5.5" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.2" stroke-dasharray="2.5,2"/>
  <!-- Outline of shape A -->
  <circle cx="13" cy="16" r="6.5" fill="none" stroke="white" stroke-width="1.5" mask="url(#diffMask)"/>
</svg>
